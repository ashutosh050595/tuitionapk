name: Build & Sign Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab in GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10' # Stably runs and compiles Gradle tasks

    - name: Build and Sign Release APK
      run: gradle :app:assembleRelease

    - name: Upload Signed APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tuition-app-signed
        path: app/build/outputs/apk/release/*-release.apk
